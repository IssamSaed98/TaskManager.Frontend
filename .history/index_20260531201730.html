<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TaskFlow</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0a0f1a" />

    <!-- Apple -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TaskFlow" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <!-- Splash Screen -->
<div id="splash" style="
position:fixed; inset:0; z-index:9999;
background:#0a0f1a;
display:flex; flex-direction:column;
align-items:center; justify-content:center;
gap:16px;
transition: opacity 0.5s ease;
">
<img src="/pwa-192x192.png" width="100" height="100" style="border-radius:22%;animation:pulse 1.5s ease-in-out infinite"/>
<div style="color:#e2f0ff;font-size:22px;font-weight:700;letter-spacing:1px">TaskFlow</div>
<div style="color:#3a5070;font-size:12px">Task Management System</div>
</div>

<style>
@keyframes pulse {
0%,100% { transform: scale(1); opacity:1; }
50% { transform: scale(1.08); opacity:0.9; }
}
</style>

<script>
window.addEventListener('load', () => {
setTimeout(() => {
  const splash = document.getElementById('splash')
  if (splash) {
    splash.style.opacity = '0'
    setTimeout(() => splash.remove(), 500)
  }
}, 2000)
})
</script>
  </body>
</html>
